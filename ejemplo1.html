<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="ejemplo1.css" />
  </head>
  <body>
    <main class="wrap">
      <form name="formulario" action="ejemplo1.php" method="post" id="f">
        Intriduce tu nombre: <input type="text" name="nombre" /> Introduce tu
        edad:
        <input type="text" name="edad" />
        <input type="submit" value="enviar" />
      </form>

      <div id="resultado"></div>
    </main>

    <script>
      document.getElementById("f").addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);

        const res = await fetch("ejemplo1.php", { method: "POST", body: fd });
        const html = await res.text(); // el PHP devuelve HTML
        document.getElementById("resultado").innerHTML = html;
      });
    </script>
  </body>
</html>
